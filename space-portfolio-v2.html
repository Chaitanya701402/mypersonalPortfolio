<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Chaitanya — Space Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;user-select:none;-webkit-user-select:none}
canvas#c{position:fixed;inset:0;z-index:0;display:block}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 30%,#080e24,#020408);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
#intro .stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
#intro .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:1}}
#intro h1{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(26px,6vw,56px);color:#fff;
  text-align:center;letter-spacing:3px;line-height:1.4;
  position:relative;z-index:1;
}
#intro h1 span{color:#4dc9f6;text-shadow:0 0 40px rgba(77,201,246,.5)}
#intro .sub{
  font-family:'JetBrains Mono',monospace;font-size:clamp(11px,1.5vw,14px);
  color:rgba(255,255,255,.4);letter-spacing:2px;margin-top:12px;
  text-align:center;position:relative;z-index:1;
}
#intro .instructions{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:rgba(255,255,255,.25);text-align:center;
  margin-top:24px;line-height:2;position:relative;z-index:1;
}
#intro .instructions strong{color:rgba(77,201,246,.7)}
#launch{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  padding:14px 44px;background:transparent;color:#ffd740;
  border:2px solid #ffd740;border-radius:8px;cursor:pointer;
  letter-spacing:3px;margin-top:28px;position:relative;z-index:1;
  transition:all .3s;
}
#launch:hover{background:#ffd740;color:#000;box-shadow:0 0 50px rgba(255,215,64,.4)}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:20;height:50px;
  background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;opacity:0;transition:opacity .6s;pointer-events:none;
}
#hud.show{opacity:1}
.hud-l,.hud-r{display:flex;align-items:center;gap:16px}
.hud-lbl{font-family:'Orbitron',sans-serif;font-size:10px;color:#4dc9f6;letter-spacing:2px;font-weight:700}
.hud-val{font-family:'Orbitron',sans-serif;font-size:12px;color:#ffd740;letter-spacing:1px;font-weight:700}
.hud-dim{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px}

/* Progress bar */
.journey-bar{width:200px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;position:relative;overflow:visible}
.journey-fill{height:100%;background:linear-gradient(90deg,#4dc9f6,#ffd740);border-radius:2px;width:0;transition:width .5s}
.journey-dots{position:absolute;top:50%;left:0;right:0;display:flex;justify-content:space-between;transform:translateY(-50%)}
.j-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:transparent;transition:all .4s}
.j-dot.visited{background:#4dc9f6;border-color:#4dc9f6;box-shadow:0 0 6px #4dc9f6}
.j-dot.current{border-color:#ffd740;box-shadow:0 0 8px rgba(255,215,64,.6)}

/* ── NOTIFICATION ── */
#notif{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-40px);z-index:30;
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;
  background:rgba(10,18,40,.9);border:1px solid rgba(77,201,246,.3);
  padding:10px 30px;border-radius:8px;letter-spacing:1px;
  opacity:0;transition:all .5s;pointer-events:none;
  box-shadow:0 4px 30px rgba(77,201,246,.15);white-space:nowrap;
}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ACTION PROMPT ── */
#action-prompt{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:25;
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  color:#ffd740;letter-spacing:2px;
  opacity:0;transition:opacity .4s;pointer-events:none;
  text-shadow:0 0 20px rgba(255,215,64,.5);
}
#action-prompt.show{opacity:1;animation:prompt-pulse 1.5s ease-in-out infinite}
@keyframes prompt-pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── WARNING ── */
#warning{
  position:fixed;inset:0;z-index:15;pointer-events:none;
  border:3px solid transparent;transition:border-color .1s;
}
#warning.hit{border-color:rgba(255,80,80,.4)}

/* ── PLANET PANEL ── */
#planet-panel{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);backdrop-filter:blur(0px);
  opacity:0;pointer-events:none;
  transition:opacity .6s,background .6s,backdrop-filter .6s;
}
#planet-panel.show{opacity:1;pointer-events:all;background:rgba(0,0,0,.7);backdrop-filter:blur(12px)}
#pp-inner{
  background:rgba(8,14,36,.96);border:1px solid rgba(77,201,246,.15);
  border-radius:20px;max-width:820px;width:94%;max-height:86vh;overflow-y:auto;
  padding:3rem;position:relative;
  box-shadow:0 0 80px rgba(77,201,246,.08),inset 0 1px 0 rgba(255,255,255,.05);
  transform:scale(.92);transition:transform .5s cubic-bezier(.34,1.56,.64,1);
}
#planet-panel.show #pp-inner{transform:scale(1)}
#pp-inner::-webkit-scrollbar{width:5px}
#pp-inner::-webkit-scrollbar-thumb{background:rgba(77,201,246,.15);border-radius:3px}
#pp-close{
  position:sticky;top:0;float:right;z-index:2;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#4dc9f6;
  background:rgba(8,14,36,.9);border:1px solid rgba(77,201,246,.2);
  padding:8px 18px;border-radius:8px;cursor:pointer;letter-spacing:2px;
  transition:all .25s;
}
#pp-close:hover{background:rgba(77,201,246,.12);box-shadow:0 0 16px rgba(77,201,246,.2)}
#pp-title{
  font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:900;
  color:#fff;margin-bottom:4px;letter-spacing:2px;
}
#pp-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:#4dc9f6;letter-spacing:3px;margin-bottom:28px}
#pp-body{color:rgba(200,216,230,.85);line-height:1.85;font-size:15px}
#pp-body h3{
  font-family:'Orbitron',sans-serif;font-size:15px;color:#ffd740;
  margin:26px 0 12px;letter-spacing:1px;font-weight:700;
  display:flex;align-items:center;gap:8px;
}
#pp-body .card{
  background:rgba(255,255,255,.025);border:1px solid rgba(77,201,246,.08);
  border-radius:12px;padding:18px 20px;margin-bottom:14px;
  transition:border-color .3s,transform .3s;
}
#pp-body .card:hover{border-color:rgba(77,201,246,.25);transform:translateY(-2px)}
#pp-body .ct{font-family:'Orbitron',sans-serif;font-size:13px;color:#fff;font-weight:700;margin-bottom:6px;letter-spacing:.5px}
#pp-body .cd{font-size:14px;color:rgba(200,216,230,.6);line-height:1.75}
#pp-body .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
#pp-body .tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:4px 10px;
  border-radius:5px;background:rgba(77,201,246,.06);color:#4dc9f6;
  border:1px solid rgba(77,201,246,.12);letter-spacing:.5px;
}
#pp-body .pill{
  display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;margin:3px;

#pp-body .pl{background:rgba(77,201,246,.06);color:#4dc9f6;border:1px solid rgba(77,201,246,.12)}
#pp-body .pf{background:rgba(0,255,135,.06);color:#0f8;border:1px solid rgba(0,255,135,.12)}
#pp-body .pt{background:rgba(180,122,255,.06);color:#b47aff;border:1px solid rgba(180,122,255,.12)}
#pp-body .edu{margin-bottom:16px}
#pp-body .edu-t{font-size:15px;color:#fff;font-weight:700}
#pp-body .edu-m{font-family:'Orbitron',sans-serif;font-size:10px;color:#4dc9f6;letter-spacing:1.5px;margin:3px 0}
#pp-body .edu-d{font-size:13px;color:rgba(200,216,230,.5)}
#pp-body .ach{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:rgba(255,215,64,.03);border:1px solid rgba(255,215,64,.1);
  border-radius:10px;margin-bottom:10px;
}
#pp-body .ach-i{font-size:24px;flex-shrink:0}
#pp-body .ach-t strong{font-size:14px;color:#ffd740;display:block;margin-bottom:3px}
#pp-body .ach-t span{font-size:12px;color:rgba(200,216,230,.5)}
#pp-body .result-badge{
  display:inline-block;margin-top:8px;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:5px;letter-spacing:.5px;

#pp-body .rb-green{background:rgba(0,255,135,.08);color:#0f8;border:1px solid rgba(0,255,135,.15)}
#pp-body .contact-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(77,201,246,.06)}
#pp-body .contact-row:last-child{border-bottom:none}
#pp-body .c-label{font-family:'Orbitron',sans-serif;font-size:10px;color:#4dc9f6;letter-spacing:1.5px;width:60px;flex-shrink:0;font-weight:700}
#pp-body .c-val{font-size:14px;color:rgba(200,216,230,.8)}

/* ── Mobile controls ── */
#mobile-ui{position:fixed;bottom:16px;z-index:25;left:50%;transform:translateX(-50%);display:none;gap:8px}
.m-btn{
  width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);
  font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.m-btn:active{background:rgba(77,201,246,.2);border-color:#4dc9f6}
.m-btn-wide{width:80px;border-radius:12px;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:1px}
@media(max-width:768px){#mobile-ui{display:flex}}
@media(max-width:600px){#pp-inner{padding:1.6rem}#pp-body{font-size:13px}}
</style>
</head>

/* ═══════════════════════════════════════════════
   THREE.JS ENGINE
═══════════════════════════════════════════════ */
let scene,camera,renderer,clock;
let rocketGrp,planets=[],asteroids=[],exhaust=[];
let keys={},started=false,panelOpen=false,visited=new Set(),xp=0;
let vel=new THREE.Vector3();
const SPEED=1.0,STEER=0.06,DAMP=0.97;
const PLANET_GAP=400;

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,4000);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:false});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  clock=new THREE.Clock();

  // Lighting
  scene.add(new THREE.AmbientLight(0x334466,0.8));
  const sun=new THREE.DirectionalLight(0xffeedd,1.5);
  sun.position.set(300,400,200);scene.add(sun);
  const backLight=new THREE.DirectionalLight(0x4488ff,0.4);
  backLight.position.set(-200,-100,100);scene.add(backLight);

  buildStars();
  buildNebulae();
  buildRocket();
  buildPlanets();
  buildAsteroids();

  camera.position.set(0,10,25);

  window.addEventListener('resize',onResize);
  window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault()});
  window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  document.querySelectorAll('.m-btn').forEach(b=>{
    const k=b.dataset.k;
    const on=()=>keys[k]=true,off=()=>keys[k]=false;
    b.addEventListener('touchstart',e=>{e.preventDefault();on()});
    b.addEventListener('touchend',e=>{e.preventDefault();off()});
    b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);
  });

  animate();
}

/* ── Stars ── */
function buildStars(){
  const N=8000,pos=new Float32Array(N*3),col=new Float32Array(N*3),sizes=new Float32Array(N);
  for(let i=0;i<N;i++){
    pos[i*3]=(Math.random()-.5)*3000;
    pos[i*3+1]=(Math.random()-.5)*3000;
    pos[i*3+2]=(Math.random()-.5)*3000;
    const c=new THREE.Color().setHSL(.55+Math.random()*.3,.5,.7+Math.random()*.3);
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
    sizes[i]=.5+Math.random()*2;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  g.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:1.5,vertexColors:true,transparent:true,opacity:.9,sizeAttenuation:true})));
}

/* ── Nebulae (big glowing clouds) ── */
function buildNebulae(){
  const colors=[0x4488ff,0x8844cc,0x44ccaa,0xcc6644,0x6644cc];
  for(let i=0;i<12;i++){
    const g=new THREE.SphereGeometry(40+Math.random()*60,16,16);
    const m=new THREE.MeshBasicMaterial({color:colors[i%colors.length],transparent:true,opacity:.015+Math.random()*.015,side:THREE.BackSide});
    const mesh=new THREE.Mesh(g,m);
    mesh.position.set((Math.random()-.5)*600,(Math.random()-.5)*400,-200-Math.random()*1800);
    mesh.scale.set(1+Math.random(),1+Math.random()*.5,1+Math.random());
    scene.add(mesh);
  }
}

/* ── Rocket ── */
function buildRocket(){
  rocketGrp=new THREE.Group();

  // Fuselage — smooth cylinder
  const bodyGeo=new THREE.CylinderGeometry(.5,.65,5,16);
  const bodyMat=new THREE.MeshStandardMaterial({color:0xe8e8e8,metalness:.6,roughness:.3});
  const body=new THREE.Mesh(bodyGeo,bodyMat);
  rocketGrp.add(body);

  // Nose — cone
  const noseGeo=new THREE.ConeGeometry(.5,2,16);
  const noseMat=new THREE.MeshStandardMaterial({color:0xee3333,metalness:.4,roughness:.4});
  const nose=new THREE.Mesh(noseGeo,noseMat);
  nose.position.y=3.5;
  rocketGrp.add(nose);

  // Engine nozzle
  const nozGeo=new THREE.CylinderGeometry(.55,.35,.8,16);
  const nozMat=new THREE.MeshStandardMaterial({color:0x444444,metalness:.8,roughness:.2});
  const noz=new THREE.Mesh(nozGeo,nozMat);
  noz.position.y=-2.9;
  rocketGrp.add(noz);

  // Windows — two portholes
  const winGeo=new THREE.CircleGeometry(.15,16);
  const winMat=new THREE.MeshStandardMaterial({color:0x00ccff,emissive:0x007799,metalness:.2,roughness:.1});
  [1.5,0.7].forEach(yy=>{
    const w=new THREE.Mesh(winGeo,winMat);
    w.position.set(0,yy,.66);rocketGrp.add(w);
    const w2=w.clone();w2.position.z=-.66;w2.rotation.y=Math.PI;rocketGrp.add(w2);
  });

  // Fins — 4 proper fins using box geometry
  const finGeo=new THREE.BoxGeometry(1.6,.12,.6);
  const finMat=new THREE.MeshStandardMaterial({color:0x2255aa,metalness:.5,roughness:.4});
  for(let i=0;i<4;i++){
    const fin=new THREE.Mesh(finGeo,finMat);
    const ang=(Math.PI/2)*i;
    fin.position.set(Math.sin(ang)*.8,-2.2,Math.cos(ang)*.8);
    fin.rotation.y=ang;
    fin.rotation.z=.3;
    rocketGrp.add(fin);
  }

  // Engine glow point light
  const eLt=new THREE.PointLight(0xff6600,0,30);
  eLt.position.y=-3.3;rocketGrp.add(eLt);
  rocketGrp.userData.eLight=eLt;

  // Rocket points FORWARD = -Z. Nose pointing -Z.
  rocketGrp.rotation.x=-Math.PI/2;
  rocketGrp.position.set(0,0,0);
  scene.add(rocketGrp);
}

/* ── Exhaust particles ── */
function spawnExhaust(){
  const g=new THREE.SphereGeometry(.1+Math.random()*.12,6,6);
  const m=new THREE.MeshBasicMaterial({
    color:new THREE.Color().setHSL(.07+Math.random()*.06,1,.4+Math.random()*.4),
    transparent:true,opacity:.9
  });
  const p=new THREE.Mesh(g,m);
  const rp=rocketGrp.position;
  p.position.set(rp.x+(Math.random()-.5)*.3, rp.y+(Math.random()-.5)*.3, rp.z+3);
  p.userData={life:.5+Math.random()*.3,vy:(Math.random()-.5)*.3,vx:(Math.random()-.5)*.3,vz:2+Math.random()*4};
  scene.add(p);exhaust.push(p);
}

/* ── Planets ── */
function buildPlanets(){
  DATA.forEach((d,i)=>{
    const r=d.size;
    // Sphere with displaced vertices for terrain feel
    const geo=new THREE.SphereGeometry(r,64,64);
    const pos=geo.attributes.position;
    for(let j=0;j<pos.count;j++){
      const v=new THREE.Vector3().fromBufferAttribute(pos,j).normalize();
      const n1=Math.sin(v.x*5)*Math.cos(v.y*4.3)*Math.sin(v.z*3.7)*.4;
      const n2=Math.sin(v.x*12+v.y*8)*.12;
      pos.setXYZ(j,v.x*(r+n1+n2),v.y*(r+n1+n2),v.z*(r+n1+n2));
    }
    geo.computeVertexNormals();
    const mat=new THREE.MeshStandardMaterial({
      color:d.color,metalness:.1,roughness:.7,
      emissive:new THREE.Color(d.color).multiplyScalar(.06),flatShading:true
    });
    const mesh=new THREE.Mesh(geo,mat);

    // Position along -Z
    const z=-(PLANET_GAP*(i+1));
    mesh.position.set((i%2===0?1:-1)*(15+Math.random()*20),(Math.random()-.5)*20,z);

    // Atmosphere
    const atGeo=new THREE.SphereGeometry(r*1.08,32,32);
    const atMat=new THREE.MeshBasicMaterial({color:d.color,transparent:true,opacity:.06,side:THREE.BackSide});
    mesh.add(new THREE.Mesh(atGeo,atMat));

    // Outer glow sphere
    const glGeo=new THREE.SphereGeometry(r*1.25,32,32);
    const glMat=new THREE.MeshBasicMaterial({color:d.color,transparent:true,opacity:.025,side:THREE.BackSide});
    mesh.add(new THREE.Mesh(glGeo,glMat));

    // Ring
    if(d.hasRing){
      const rg=new THREE.RingGeometry(r+4,r+10,80);
      const rm=new THREE.MeshBasicMaterial({color:d.color,side:THREE.DoubleSide,transparent:true,opacity:.18});
      const ring=new THREE.Mesh(rg,rm);
      ring.rotation.x=Math.PI/2.5;
      mesh.add(ring);
    }

    // Point light at planet
    const pl=new THREE.PointLight(d.color,.6,r*5);
    mesh.add(pl);

    // Text label
    const cv=document.createElement('canvas');cv.width=512;cv.height=64;
    const cx=cv.getContext('2d');
    cx.font='bold 32px Orbitron,sans-serif';cx.fillStyle='#ffffff';
    cx.textAlign='center';cx.fillText(d.name,256,42);
    const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:.85}));
    sprite.scale.set(28,3.5,1);sprite.position.y=r+10;
    mesh.add(sprite);

    // Sub label
    const cv2=document.createElement('canvas');cv2.width=512;cv2.height=48;
    const cx2=cv2.getContext('2d');
    cx2.font='600 20px JetBrains Mono,monospace';
    const cc=new THREE.Color(d.color);
    cx2.fillStyle=`rgb(${Math.round(cc.r*255)},${Math.round(cc.g*255)},${Math.round(cc.b*255)})`;
    cx2.textAlign='center';cx2.fillText(d.sub.replace(/&amp;/g,'&'),256,32);
    const sp2=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv2),transparent:true,opacity:.6}));
    sp2.scale.set(20,2.5,1);sp2.position.y=r+6;
    mesh.add(sp2);

    mesh.userData.idx=i;
    planets.push(mesh);
    scene.add(mesh);
  });
}

/* ── Asteroids ── */
function buildAsteroids(){
  for(let i=0;i<100;i++){
    // Icosahedron with random vertex displacement = cratered look
    const g=new THREE.IcosahedronGeometry(1,1);
    const pos=g.attributes.position;
    for(let j=0;j<pos.count;j++){
      const v=new THREE.Vector3().fromBufferAttribute(pos,j);
      v.multiplyScalar(.8+Math.random()*.4);
      pos.setXYZ(j,v.x,v.y,v.z);
    }
    g.computeVertexNormals();

    const shade=.15+Math.random()*.2;
    const m=new THREE.MeshStandardMaterial({color:new THREE.Color(shade,shade*.9,shade*.8),roughness:.9,metalness:.1,flatShading:true});
    const mesh=new THREE.Mesh(g,m);
    const s=.8+Math.random()*3;
    mesh.scale.set(s,s*(.5+Math.random()*.7),s);
    placeAsteroid(mesh,true);
    mesh.userData.rot=new THREE.Vector3((Math.random()-.5)*.015,(Math.random()-.5)*.015,(Math.random()-.5)*.015);
    asteroids.push(mesh);
    scene.add(mesh);
  }
}

function placeAsteroid(a,initial){
  const rz=rocketGrp?rocketGrp.position.z:0;
  a.position.set(
    (Math.random()-.5)*140,
    (Math.random()-.5)*70,
    initial ? -30-Math.random()*1800 : rz-120-Math.random()*400
  );
  // Don't place too close to planets
  planets.forEach(p=>{
    if(a.position.distanceTo(p.position)<p.userData.idx*3+35){
      a.position.x+=(Math.random()-.5)*60;
      a.position.y+=(Math.random()-.5)*40;
    }
  });
}

/* ═══════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════ */
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);

  if(started&&!panelOpen){
    updateFlight(dt);
    updateAsteroids(dt);
    updateExhaust(dt);
    checkHits();
    checkPlanets();
    updateHUD();
  }

  planets.forEach((p,i)=>p.rotation.y+=.002*(1+i*.2));
  updateCamera(dt);
  renderer.render(scene,camera);
}

/* ── Flight ── */
function updateFlight(dt){
  const fw=keys['w']||keys['arrowup'];
  const bk=keys['s']||keys['arrowdown'];
  const lt=keys['a']||keys['arrowleft'];
  const rt=keys['d']||keys['arrowright'];
  const up=keys['q'];
  const dn=keys['e'];

  // Thrust forward (-Z)
  if(fw){
    vel.z-=SPEED*dt*60;
    rocketGrp.userData.eLight.intensity=3+Math.random()*2;
    if(Math.random()>.2)spawnExhaust();
    if(Math.random()>.5)spawnExhaust();
  } else {
    rocketGrp.userData.eLight.intensity=Math.max(0,rocketGrp.userData.eLight.intensity-.1);
  }

  // Brake
  if(bk) vel.z*=Math.pow(.92,dt*60);

  // Steer left/right
  if(lt) vel.x-=STEER*dt*60;
  if(rt) vel.x+=STEER*dt*60;

  // Up/down
  if(up) vel.y+=STEER*dt*60;
  if(dn) vel.y-=STEER*dt*60;

  // Clamp max speed
  vel.z=Math.max(vel.z,-5);
  vel.z=Math.min(vel.z,2); // can go backwards a bit

  // Damping
  vel.x*=DAMP;vel.y*=DAMP;

  rocketGrp.position.add(vel.clone().multiplyScalar(dt*60));

  // Bounds
  rocketGrp.position.x=THREE.MathUtils.clamp(rocketGrp.position.x,-90,90);
  rocketGrp.position.y=THREE.MathUtils.clamp(rocketGrp.position.y,-50,50);

  // Tilt rocket based on steering
  const targetRollZ=lt?0.35:(rt?-0.35:0);
  const targetRollX=-Math.PI/2+(up?-0.2:(dn?0.2:0));
  rocketGrp.rotation.z=THREE.MathUtils.lerp(rocketGrp.rotation.z,targetRollZ,0.06);
  rocketGrp.rotation.x=THREE.MathUtils.lerp(rocketGrp.rotation.x,targetRollX,0.06);
}

/* ── Camera ── */
function updateCamera(dt){
  if(!started)return;
  const rp=rocketGrp.position;
  const idealPos=new THREE.Vector3(rp.x*.3, rp.y*.3+8, rp.z+22);
  camera.position.lerp(idealPos,.03);
  const lookAt=rp.clone().add(new THREE.Vector3(0,0,-30));
  camera.lookAt(lookAt);
}

/* ── Asteroids ── */
function updateAsteroids(dt){
  const rz=rocketGrp.position.z;
  asteroids.forEach(a=>{
    a.rotation.x+=a.userData.rot.x;
    a.rotation.y+=a.userData.rot.y;
    a.rotation.z+=a.userData.rot.z;
    if(a.position.z>rz+80) placeAsteroid(a,false);
  });
}

/* ── Exhaust ── */
function updateExhaust(dt){
  for(let i=exhaust.length-1;i>=0;i--){
    const p=exhaust[i];
    p.userData.life-=dt;
    p.position.x+=p.userData.vx*dt;
    p.position.y+=p.userData.vy*dt;
    p.position.z+=p.userData.vz*dt;
    p.material.opacity=Math.max(0,p.userData.life/.8);
    p.scale.multiplyScalar(.96);
    if(p.userData.life<=0){
      scene.remove(p);p.geometry.dispose();p.material.dispose();
      exhaust.splice(i,1);
    }
  }
}

/* ── Collision ── */
function checkHits(){
  const rp=rocketGrp.position;
  asteroids.forEach(a=>{
    const d=rp.distanceTo(a.position);
    const hr=1.5+a.scale.x;
    if(d<hr){
      // Bounce it away
      const dir=a.position.clone().sub(rp).normalize();
      a.position.add(dir.multiplyScalar(6));
      vel.multiplyScalar(.6);
      // Screen flash
      const w=document.getElementById('warning');
      w.classList.add('hit');setTimeout(()=>w.classList.remove('hit'),150);
      notify('ASTEROID HIT!');
    }
  });
}

/* ── Planet proximity ── */
function checkPlanets(){
  const rp=rocketGrp.position;
  let nearAny=false;
  const prompt=document.getElementById('action-prompt');
  const hPlanet=document.getElementById('hPlanet');

  planets.forEach((p,i)=>{
    const dist=rp.distanceTo(p.position);
    const r=DATA[i].size;
    const landDist=r+28;
    const approachDist=r+60;

    if(dist<approachDist){
      hPlanet.textContent=DATA[i].name;
      hPlanet.style.color=`#${new THREE.Color(DATA[i].color).getHexString()}`;
    }

    if(dist<landDist){
      nearAny=true;
      if(keys[' ']){
        openPanel(i);
        keys[' ']=false;
      }
    }
  });

  if(nearAny){
    prompt.classList.add('show');
  } else {
    prompt.classList.remove('show');
    // Check if we're not near any planet
    let minDist=Infinity;
    planets.forEach(p=>{if(rp.distanceTo(p.position)<minDist)minDist=rp.distanceTo(p.position)});
    if(minDist>100) hPlanet.textContent='DEEP SPACE';
  }
}

/* ═══════════════════════════════════════════════
   HUD
═══════════════════════════════════════════════ */
function updateHUD(){
  const rp=rocketGrp.position;
  // Journey progress
  const totalDist=PLANET_GAP*4;
  const prog=Math.min(1,Math.abs(rp.z)/totalDist);
  document.getElementById('jFill').style.width=(prog*100)+'%';

  // Distance to next unvisited planet
  let nextDist=null;
  for(let i=0;i<4;i++){
    if(!visited.has(i)){
      nextDist=Math.round(rp.distanceTo(planets[i].position));
      break;
    }
  }
  document.getElementById('hDist').textContent=nextDist?`NEXT: ${nextDist}u`:(visited.size===4?'ALL EXPLORED':'');
  document.getElementById('hXP').textContent='XP '+xp;

  // Update dots
  for(let i=0;i<4;i++){
    const dot=document.getElementById('jd'+i);
    dot.classList.toggle('visited',visited.has(i));
    const near=rp.distanceTo(planets[i].position)<DATA[i].size+60;
    dot.classList.toggle('current',near&&!visited.has(i));
  }
}

/* ═══════════════════════════════════════════════
   PANELS
═══════════════════════════════════════════════ */
function openPanel(idx){
  if(panelOpen)return;
  panelOpen=true;
  const d=DATA[idx];
  document.getElementById('pp-title').textContent=d.name;
  document.getElementById('pp-sub').textContent=d.sub.replace(/&amp;/g,'&');
  document.getElementById('pp-body').innerHTML=d.html;
  document.getElementById('planet-panel').classList.add('show');
  if(!visited.has(idx)){
    visited.add(idx);
    xp+=500;
    notify('PLANET DISCOVERED! +500 XP');
  }
  keys={};
}

function closePanel(){
  panelOpen=false;
  document.getElementById('planet-panel').classList.remove('show');
  if(visited.size===4){
    setTimeout(()=>notify('ALL PLANETS EXPLORED! Full portfolio unlocked.'),700);
  }
}

/* ── Notify ── */
function notify(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;n.classList.add('show');
  clearTimeout(n._t);n._t=setTimeout(()=>n.classList.remove('show'),3000);
}

/* ── Start ── */
function startGame(){
  const o=document.getElementById('intro');
  o.style.opacity='0';
  setTimeout(()=>{
    o.style.display='none';
    document.getElementById('hud').classList.add('show');
    started=true;
    notify('LAUNCHED! Fly towards the planets ahead.');
  },1200);
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

init();
</script>
